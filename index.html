<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>世界杯 2026 · 赛果与赛程</title>
<style>
  :root{
    --bg:#EEF1F5; --card:#FFFFFF; --ink:#14181F; --muted:#697282; --faint:#A2AAB6;
    --line:#E4E8EE; --turf:#1E8E5A; --turf-deep:#125537; --live:#E5484D; --amber:#C98A12;
    --pill:#EEF4F0; --pill-ink:#1E6E48; --draw-bg:#EEF1F5; --draw-ink:#566070;
    --shadow:0 1px 2px rgba(20,24,31,.05),0 6px 18px rgba(20,24,31,.06);
    --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,monospace;
    --cjk:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--cjk);font-size:16px;line-height:1.4;
       -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
  .wrap{max-width:560px;margin:0 auto}

  header{position:sticky;top:0;z-index:20;background:rgba(238,241,245,.86);
         backdrop-filter:saturate(160%) blur(12px);-webkit-backdrop-filter:saturate(160%) blur(12px);
         border-bottom:1px solid var(--line)}
  .hbar{max-width:560px;margin:0 auto;padding:14px 16px 10px}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:baseline;gap:8px;min-width:0}
  .brand b{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .brand .yr{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--turf);letter-spacing:-.04em}
  .fifa{flex:none;display:inline-flex;align-items:center;gap:5px;text-decoration:none;
        background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:8px 12px;border-radius:999px}
  .fifa:active{transform:scale(.97)}
  .sub{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.5}
  .sub .tz{font-family:var(--mono)}

  .seg{display:flex;gap:4px;margin-top:11px;background:#E2E7EE;padding:3px;border-radius:11px}
  .seg button{flex:1;border:0;background:transparent;font-family:var(--cjk);
              font-size:13px;font-weight:600;color:var(--muted);padding:7px 4px;border-radius:9px;cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .seg button .ct{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:3px}
  .seg button[aria-pressed="true"] .ct{color:var(--turf)}

  .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;font-size:12px;color:var(--muted)}
  .meta .upd{display:flex;align-items:center;gap:6px;min-width:0}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
  .dot.ok{background:var(--turf)} .dot.err{background:var(--live)}
  .dot.load{background:var(--amber);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}
  .actions{display:flex;gap:6px;flex:none}
  .actions select,.refresh{font-family:var(--cjk);font-size:12px;color:var(--ink);
        border:1px solid var(--line);background:var(--card);border-radius:8px;padding:5px 8px;cursor:pointer}
  .refresh{font-weight:600}
  .refresh:active{transform:scale(.97)}

  main{padding:6px 12px 40px}
  .day{margin-top:18px}
  .dayhd{display:flex;align-items:baseline;gap:8px;padding:0 4px 8px}
  .dayhd .d{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .dayhd .w{font-size:12px;color:var(--muted)}
  .dayhd .rule{flex:1;height:1px;background:var(--line);align-self:center;margin-left:2px}

  .card{display:block;background:var(--card);border:1px solid var(--line);border-radius:16px;
        box-shadow:var(--shadow);padding:13px 14px;margin-bottom:10px;position:relative;overflow:hidden}
  .card.live{border-color:rgba(229,72,77,.4)}
  .chd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
  .tags{display:flex;gap:6px;align-items:center;min-width:0}
  .pill{font-size:11px;font-weight:700;color:var(--pill-ink);background:var(--pill);
        padding:3px 8px;border-radius:999px;white-space:nowrap}
  .pill.ko{color:var(--turf-deep)}
  .state{font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap;flex:none}
  .state.up{color:var(--faint)}
  .state.fin{color:var(--muted)}
  .state.live{color:var(--live);display:inline-flex;align-items:center;gap:5px}
  /* draw coin badge (sits after each country name, mirrors the 胜 coin) */
  .draw-badge{flex:none;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
        border-radius:50%;background:#fff;border:2px solid #2563EB;color:#2563EB;
        font-size:11px;font-weight:800;line-height:1;margin-left:7px}
  /* rolling football for live */
  .ball{display:inline-block;font-size:14px;line-height:1;will-change:transform;
        animation:roll 1s linear infinite alternate}
  @keyframes roll{0%{transform:translateX(-3px) rotate(-18deg)}100%{transform:translateX(3px) rotate(342deg)}}

  .grid{display:grid;grid-template-columns:1fr auto;column-gap:12px;align-items:center}
  .sides{display:flex;flex-direction:column;gap:8px;min-width:0}
  .side{display:flex;align-items:center;gap:9px;min-width:0}
  .fl{font-size:20px;line-height:1;flex:none;width:24px;text-align:center}
  .nm{font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .side.tbd .nm{color:var(--faint);font-weight:600;font-size:15px}
  .win-badge{flex:none;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
        border-radius:50%;background:#fff;border:2px solid var(--live);color:var(--live);
        font-size:11px;font-weight:800;line-height:1;margin-left:7px}

  .figure{flex:none;text-align:right;min-width:64px;display:flex;flex-direction:column;
          align-items:flex-end;justify-content:center;gap:8px}
  .scores{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .sc{font-family:var(--mono);font-size:25px;font-weight:700;line-height:1;
      font-variant-numeric:tabular-nums;color:var(--ink);min-height:25px;display:flex;align-items:center}
  .sc.dim{color:var(--faint)}
  .sc.liven{color:var(--live)}
  .kick{display:flex;flex-direction:column;align-items:flex-end}
  .kick .eyebrow{font-size:10px;font-weight:700;color:var(--faint);letter-spacing:.06em}
  .kick .t{font-family:var(--mono);font-size:23px;font-weight:700;letter-spacing:-.02em;
           font-variant-numeric:tabular-nums;color:var(--turf-deep)}

  .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:11px;
        padding-top:10px;border-top:1px dashed var(--line);font-size:12px;color:var(--muted)}
  .foot .loc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .foot .when{font-family:var(--mono);white-space:nowrap;flex:none;color:var(--faint)}
  .foot .wlabel{font-family:var(--cjk);font-weight:600}

  /* universal broadcast entry (mainland China rights holders) */
  .liveentry{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px}
  .liveentry .lelbl{font-size:12px;color:var(--muted);font-weight:700;margin-right:1px}
  .wbtn{font-size:12px;font-weight:600;color:var(--turf-deep);background:var(--pill);
        border:1px solid #CFE3D6;border-radius:999px;padding:5px 11px;text-decoration:none}
  .wbtn:active{transform:scale(.96)}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:48px 20px}
  .legend{text-align:center;color:var(--faint);font-size:11px;margin-top:22px;line-height:1.7}

  .card.clickable{cursor:pointer}
  .card.clickable:active{transform:scale(.992)}
  .wm-overlay{position:fixed;inset:0;z-index:50;background:rgba(20,24,31,.5);
    display:flex;align-items:flex-end;justify-content:center;padding:14px}
  .wm-overlay[hidden]{display:none}
  .wm-card{background:var(--card);border-radius:18px;width:100%;max-width:420px;
    padding:18px 16px calc(14px + env(safe-area-inset-bottom));box-shadow:0 -10px 44px rgba(0,0,0,.22)}
  .wm-title{font-size:16px;font-weight:800;text-align:center;color:var(--ink)}
  .wm-sub{font-size:13px;color:var(--muted);text-align:center;margin:5px 0 15px}
  .wm-btn{display:block;text-align:center;text-decoration:none;font-size:16px;font-weight:700;
    color:var(--turf-deep);background:var(--pill);border:1px solid #CFE3D6;border-radius:12px;
    padding:13px;margin-bottom:9px}
  .wm-btn:active{transform:scale(.99)}
  .wm-cancel{display:block;width:100%;font-family:var(--cjk);font-size:15px;font-weight:600;
    color:var(--muted);background:transparent;border:0;padding:11px;cursor:pointer}
  /* ===== 视图切换 赛程/积分榜 ===== */
  .viewtabs{display:flex;gap:6px;margin:11px 0 0;background:#E2E7EE;padding:3px;border-radius:11px}
  .viewtabs button{flex:1;border:0;cursor:pointer;font-family:var(--cjk);font-size:13px;font-weight:700;
    color:var(--muted);background:transparent;padding:8px 4px;border-radius:9px}
  .viewtabs button[aria-pressed="true"]{background:var(--turf);color:#fff;box-shadow:var(--shadow)}
  /* ===== 积分榜 / 晋级预测 ===== */
  #standings{padding:6px 12px 44px}
  #standings[hidden]{display:none}
  .stnote{background:#FFF8E6;border:1px solid #F0E0B0;border-radius:12px;color:#6b5618;
    font-size:12px;line-height:1.65;padding:10px 12px;margin:10px 2px 16px}
  .stnote b{color:#5a4710}
  .grp{margin:0 0 18px}
  .grp h3{font-size:15px;font-weight:800;margin:0 0 8px;padding:0 2px;display:flex;align-items:center;gap:7px}
  .grp h3 .gb{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;
    padding:0 6px;border-radius:7px;background:var(--turf);color:#fff;font-size:12px;font-weight:800}
  table.stt{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;font-size:13px;box-shadow:var(--shadow)}
  table.stt th,table.stt td{padding:8px 3px;text-align:center;border-bottom:1px solid var(--line)}
  table.stt thead th{font-size:11px;color:var(--muted);font-weight:700;background:#F6F8FB}
  table.stt tr:last-child td{border-bottom:0}
  table.stt .tm{text-align:left;padding-left:9px;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;max-width:0;width:99%}
  table.stt .tm .fl{font-size:15px;width:auto;margin-right:6px;text-align:left}
  table.stt .rk{width:24px;color:var(--faint);font-family:var(--mono)}
  table.stt td.pt{font-weight:800;color:var(--ink)}
  table.stt tr.q1 td,table.stt tr.q2 td{background:rgba(30,142,90,.10)}
  table.stt tr.q3 td{background:rgba(201,138,18,.13)}
  table.stt tr.q1 .rk,table.stt tr.q2 .rk{color:var(--turf);font-weight:800}
  table.stt tr.q3 .rk{color:var(--amber);font-weight:800}
  .qbadge{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px}
  .qbadge.in{background:var(--pill);color:var(--pill-ink)}
  .qbadge.out{background:#F3E0E0;color:#9B2C2C}
  .q32 h3{font-size:15px;font-weight:800;margin:18px 2px 10px}
  .qcol{margin-bottom:13px}
  .qcol .lbl{font-size:12px;color:var(--muted);font-weight:700;margin:0 2px 7px}
  .qchips{display:flex;flex-wrap:wrap;gap:6px}
  .qchip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
    border-radius:999px;padding:5px 10px;font-size:13px;font-weight:600;box-shadow:var(--shadow)}
  .qchip .fl{font-size:15px;width:auto}
  .qchip .g{color:var(--faint);font-family:var(--mono);font-size:11px}
  /* ===== 阶段标签(赛程按轮次切换) ===== */
  .stagetabs{display:flex;gap:6px;margin:11px -2px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding:0 2px 2px;scrollbar-width:none}
  .stagetabs::-webkit-scrollbar{display:none}
  .stagetabs button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);cursor:pointer;
    font-family:var(--cjk);font-size:13px;font-weight:700;color:var(--muted);padding:7px 13px;border-radius:999px}
  .stagetabs button[aria-pressed="true"]{background:var(--turf);color:#fff;border-color:var(--turf)}
  /* ===== 淘汰赛对阵 / 晋级 bracket ===== */
  .brkrd{margin:0 0 14px}
  .brkh{font-size:14px;font-weight:800;margin:0 2px 8px;display:flex;align-items:center;gap:8px}
  .brkh .brkc{font-size:11px;font-weight:700;color:var(--faint);font-family:var(--mono)}
  .brkwait{font-size:12px;color:var(--faint);background:var(--card);border:1px dashed var(--line);
    border-radius:10px;padding:10px 12px}
  .brkm{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;box-shadow:var(--shadow);padding:9px 11px;margin-bottom:7px}
  .brkt{flex:1;min-width:0;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brkt .fl{font-size:16px;flex:none}
  .brkt.aw{justify-content:flex-end;text-align:right}
  .brkt.win{font-weight:800;color:var(--turf-deep)}
  .brkt.tbd{color:var(--faint)}
  .brkok{color:var(--turf);font-weight:800}
  .brkmid{flex:none;min-width:52px;text-align:center;font-family:var(--mono)}
  .brks{font-size:15px;font-weight:800}
  .brkd{color:var(--faint);margin:0 2px}
  .brkvs{font-size:12px;color:var(--faint)}
  .champ{margin-top:8px;background:linear-gradient(90deg,rgba(201,138,18,.18),rgba(201,138,18,.04));
    border:1px solid #EBD9A8;border-radius:12px;padding:12px 14px;font-size:16px;font-weight:800;
    display:flex;align-items:center;gap:8px}
  .champ .fl{font-size:20px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap"></div>
<header>
  <div class="hbar">
    <div class="toprow">
      <div class="brand"><span>⚽</span><b>世界杯</b><span class="yr">2026</span></div>
      <a class="fifa" id="fifaTop" target="_blank" rel="noopener">FIFA 官网 ↗</a>
    </div>
    <div class="sub">美 · 加 · 墨主办 &nbsp;·&nbsp; 6/11 – 7/19 &nbsp;·&nbsp; 共 104 场<br>
      时间按你的设备时区显示 · 当前 <span class="tz" id="tzName">—</span></div>
    <div class="viewtabs" id="viewtabs">
      <button data-v="schedule" aria-pressed="true">赛程</button>
      <button data-v="table" aria-pressed="false">积分榜 · 晋级</button>
    </div>
    <div class="stagetabs" id="stageTabs">
      <button data-st="all">全部</button>
      <button data-st="group-stage">小组赛</button>
      <button data-st="round-of-32">32强</button>
      <button data-st="round-of-16">16强</button>
      <button data-st="quarter-finals">8强</button>
      <button data-st="semi-finals">4强</button>
      <button data-st="finals">决赛</button>
    </div>
    <div class="seg" id="seg">
      <button data-f="all" aria-pressed="true">全部<span class="ct" id="c-all"></span></button>
      <button data-f="live" aria-pressed="false">进行中<span class="ct" id="c-live"></span></button>
      <button data-f="fin" aria-pressed="false">已结束<span class="ct" id="c-fin"></span></button>
      <button data-f="up" aria-pressed="false">未开始<span class="ct" id="c-up"></span></button>
    </div>
    <div class="meta">
      <div class="upd"><span class="dot" id="updDot"></span><span id="updTxt">正在获取最新比分…</span></div>
      <div class="actions">
        <button class="refresh" id="refreshBtn">刷新比分</button>
      </div>
    </div>
    <div class="liveentry" id="liveEntry">
      <span class="lelbl">📡 直播入口</span>
      <a class="wbtn" href="https://www.yangshipin.cn/" target="_blank" rel="noopener">央视频</a>
      <a class="wbtn" href="https://www.miguvideo.com/" target="_blank" rel="noopener">咪咕视频</a>
      <a class="wbtn" href="https://www.xiaohongshu.com/" target="_blank" rel="noopener">小红书</a>
    </div>
  </div>
</header>
<main id="list"></main>
<section id="standings" hidden></section>

<div id="watchModal" class="wm-overlay" hidden>
  <div class="wm-card" role="dialog" aria-modal="true" aria-label="选择直播平台">
    <div class="wm-title">选择直播平台</div>
    <div class="wm-sub" id="wmSub"></div>
    <a class="wm-btn" href="https://www.yangshipin.cn/" target="_blank" rel="noopener">📺 央视频</a>
    <a class="wm-btn" href="https://www.miguvideo.com/" target="_blank" rel="noopener">📱 咪咕视频</a>
    <a class="wm-btn" href="https://www.xiaohongshu.com/" target="_blank" rel="noopener">📕 小红书</a>
    <button class="wm-cancel" id="wmCancel" type="button">取消</button>
  </div>
</div>

const KNOCK=new Set(["round-of-32","round-of-16","quarter-finals","semi-finals","third-place","final"]);
function isKnock(m){return KNOCK.has(m.sk);}
function teamsKnown(m){return !!(m.hf&&m.af);}   // 队伍已确定:小组赛恒真;淘汰赛回填真实对阵后为真
function koMs(m){return Date.parse(m.ko);}
function endMs(m){return koMs(m)+(isKnock(m)?180:135)*60000;}
const fmtTime=new Intl.DateTimeFormat('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});
const fmtDay=new Intl.DateTimeFormat('zh-CN',{month:'long',day:'numeric'});
const fmtWeek=new Intl.DateTimeFormat('zh-CN',{weekday:'short'});
const fmtMD=new Intl.DateTimeFormat('zh-CN',{month:'numeric',day:'numeric'});
function dayKey(m){const d=new Date(koMs(m));return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}

function norm(s){return (s||"").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');}
const ALIAS={southkorea:'korearepublic',korea:'korearepublic',republicofkorea:'korearepublic',
 turkey:'turkiye',usa:'unitedstates',unitedstatesofamerica:'unitedstates',us:'unitedstates',
 iran:'iriran',capeverde:'caboverde',ivorycoast:'cotedivoire',
 drcongo:'congodr',democraticrepublicofthecongo:'congodr',congokinshasa:'congodr',congo:'congodr',
 bosnia:'bosniaandherzegovina',bosniaherzegovina:'bosniaandherzegovina',bih:'bosniaandherzegovina',
 czechrepublic:'czechia',czech:'czechia',saudi:'saudiarabia',uzbek:'uzbekistan'};
function canon(s){const n=norm(s);return ALIAS[n]||n;}
function pairKey(a,b){return [canon(a),canon(b)].sort().join('|');}

// === STD_START (纯函数:按 FIFA 规则算积分榜+晋级32强;由 scripts/test_standings.js 提取单测) ===
function computeStandings(DATA, RESULTS){
  var KN={"round-of-32":1,"round-of-16":1,"quarter-finals":1,"semi-finals":1,"third-place":1,"final":1};
  function fin(m){var r=RESULTS[m.n];return (r&&!r.live)?r:null;}            // 只算已完赛、非进行中
  var groups={};
  DATA.forEach(function(m){
    if(KN[m.sk]||!m.g)return;
    if(!groups[m.g])groups[m.g]={};
    var G=groups[m.g];
    if(!G[m.h])G[m.h]={eng:m.h,name:m.hz,flag:m.hf,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0};
    if(!G[m.a])G[m.a]={eng:m.a,name:m.az,flag:m.af,P:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0};
  });
  DATA.forEach(function(m){
    if(KN[m.sk]||!m.g)return; var r=fin(m); if(!r)return;
    var H=groups[m.g][m.h],A=groups[m.g][m.a]; if(!H||!A)return;
    H.P++;A.P++; H.GF+=r.hs;H.GA+=r.as; A.GF+=r.as;A.GA+=r.hs;
    if(r.hs>r.as){H.W++;A.L++;H.Pts+=3;}
    else if(r.hs<r.as){A.W++;H.L++;A.Pts+=3;}
    else{H.D++;A.D++;H.Pts++;A.Pts++;}
  });
  function h2h(g,members){                                                   // 同分球队之间的相互战绩
    var mini={}; members.forEach(function(e){mini[e]={Pts:0,GD:0,GF:0};});
    DATA.forEach(function(m){
      if(KN[m.sk]||m.g!==g)return;
      if(members.indexOf(m.h)<0||members.indexOf(m.a)<0)return;
      var r=RESULTS[m.n]; if(!r||r.live)return;
      var H=mini[m.h],A=mini[m.a];
      H.GF+=r.hs;H.GD+=(r.hs-r.as); A.GF+=r.as;A.GD+=(r.as-r.hs);
      if(r.hs>r.as)H.Pts+=3; else if(r.hs<r.as)A.Pts+=3; else{H.Pts++;A.Pts++;}
    });
    return mini;
  }
  var out={};
  Object.keys(groups).forEach(function(g){
    var arr=Object.keys(groups[g]).map(function(k){return groups[g][k];});
    arr.forEach(function(t){t.GD=t.GF-t.GA;});
    arr.sort(function(a,b){return b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF;});      // 1.积分 2.净胜球 3.进球
    var i=0;                                                                 // 三项全平 -> 相互战绩
    while(i<arr.length){
      var j=i+1;
      while(j<arr.length&&arr[j].Pts===arr[i].Pts&&arr[j].GD===arr[i].GD&&arr[j].GF===arr[i].GF)j++;
      if(j-i>1){
        var members=arr.slice(i,j).map(function(t){return t.eng;});
        var mini=h2h(g,members);
        var sub=arr.slice(i,j).sort(function(a,b){
          return mini[b.eng].Pts-mini[a.eng].Pts||mini[b.eng].GD-mini[a.eng].GD||mini[b.eng].GF-mini[a.eng].GF;});
        for(var k=0;k<sub.length;k++)arr[i+k]=sub[k];
      }
      i=j;
    }
    out[g]=arr;
  });
  var thirds=Object.keys(out).filter(function(g){return out[g].length>=3;})  // 12 个小组第3名跨组排名
    .map(function(g){return {g:g,t:out[g][2]};});
  thirds.sort(function(a,b){return b.t.Pts-a.t.Pts||b.t.GD-a.t.GD||b.t.GF-a.t.GF;});
  thirds.forEach(function(x,idx){x.qualified=idx<8;});                       // 取前 8 个最佳第3名
  var winners=Object.keys(out).sort().map(function(g){return {g:g,t:out[g][0]};}).filter(function(x){return x.t;});
  var runners=Object.keys(out).sort().map(function(g){return {g:g,t:out[g][1]};}).filter(function(x){return x.t;});
  return {groups:out,thirds:thirds,winners:winners,runners:runners};
}
// === STD_END ===

const byPair={};
DATA.forEach(m=>{ if(teamsKnown(m)) byPair[pairKey(m.h,m.a)]=m; });   // 含已确定的淘汰赛对阵

let RESULTS={};
function statusOf(m){
  const r=RESULTS[m.n], now=Date.now();
  if(r) return r.live?'live':'fin';
  if(now<koMs(m)) return 'up';
  if(now<endMs(m)) return 'live';
  return 'fin';
}

let landedDone=false, lastNext=null, scoreRenders=0, curStage='all';
function render(){
  const fStat=document.querySelector('#seg button[aria-pressed="true"]').dataset.f;
  const fStage=curStage;
  const counts={all:0,live:0,fin:0,up:0};
  const list=document.getElementById('list'); list.innerHTML='';
  const sorted=[...DATA].sort((a,b)=>koMs(a)-koMs(b));

  sorted.forEach(m=>{
    if(!stageMatch(m,fStage))return;
    const s=statusOf(m); counts.all++; counts[s]++;
  });
  document.getElementById('c-all').textContent=counts.all;
  document.getElementById('c-live').textContent=counts.live;
  document.getElementById('c-fin').textContent=counts.fin;
  document.getElementById('c-up').textContent=counts.up;

  let curDay=null, dayEl=null, shown=0, firstNext=null;
  sorted.forEach(m=>{
    if(!stageMatch(m,fStage))return;
    const s=statusOf(m);
    if(fStat!=='all'&&fStat!==s)return;
    shown++;
    const dk=dayKey(m);
    if(dk!==curDay){
      curDay=dk; dayEl=document.createElement('section'); dayEl.className='day';
      const d=new Date(koMs(m));
      dayEl.innerHTML='<div class="dayhd"><span class="d">'+fmtDay.format(d)+
        '</span><span class="w">'+fmtWeek.format(d)+'</span><span class="rule"></span></div>';
      list.appendChild(dayEl);
    }
    dayEl.appendChild(card(m,s));
    if(!firstNext&&(s==='up'||s==='live')) firstNext=dayEl.lastChild;
  });

  if(shown===0) list.innerHTML='<div class="empty">这个筛选下暂时没有比赛。<br>换个标签看看 🙂</div>';
  else list.insertAdjacentHTML('beforeend',
    '<div class="legend">比分来自公开体育数据源，仅供参考，以 FIFA 官方为准<br>'+
    '点右上角“刷新比分”获取最新结果</div>');

  lastNext=firstNext;   // 记录「已结束 ↔ 未开始」交界,landBoundary() 据此定位
}

// 阶段标签:把每个 sk 归到一个标签;'finals' 含决赛+三四名
function stageMatch(m,st){
  if(st==='all')return true;
  if(st==='finals')return m.sk==='final'||m.sk==='third-place';
  return m.sk===st;
}
// 当前轮次 = 最早一场「未结束」比赛所属阶段(小组赛打完就自动跳到 32 强,依此类推)
function currentStageTab(){
  const up=[...DATA].sort((a,b)=>koMs(a)-koMs(b)).find(m=>statusOf(m)!=='fin');
  if(!up)return 'finals';
  return (up.sk==='final'||up.sk==='third-place')?'finals':up.sk;
}
function setStage(v){
  curStage=v;
  document.querySelectorAll('#stageTabs button').forEach(b=>b.setAttribute('aria-pressed', b.dataset.st===v?'true':'false'));
  render();
}

function card(m,s){
  const el=document.createElement('div');
  el.className='card'+(s==='live'?' live':'');
  const r=RESULTS[m.n], tbd=isKnock(m)&&!teamsKnown(m);
  const pill=isKnock(m)?'<span class="pill ko">🏆 '+m.st+'</span>'
                       :'<span class="pill">'+(m.g?m.g+'组 · ':'')+m.st+'</span>';

  const draw = r && !r.live && r.hs===r.as;
  let hB=null,aB=null;
  if(r&&!r.live){ if(draw){hB='draw';aB='draw';} else if(r.hs>r.as){hB='win';} else {aB='win';} }

  let state;
  if(s==='live') state='<span class="state live"><span class="ball">⚽</span>进行中 · 看直播 ›</span>';
  else if(s==='fin') state='<span class="state fin">完场</span>';
  else state='<span class="state up">未开始</span>';

  const side=(flag,name,badge,isTbd)=>
    '<div class="side'+(isTbd?' tbd':'')+'"><span class="fl">'+(flag||'🏳️')+'</span>'+
    '<span class="nm">'+name+'</span>'+
    (badge==='win'?'<span class="win-badge">胜</span>':badge==='draw'?'<span class="draw-badge">平</span>':'')+
    '</div>';

  let figure;
  if(r){ // we have a score (live or finished)
    const cls = r.live ? ' liven' : '';
    figure='<div class="scores"><span class="sc'+cls+'">'+r.hs+'</span><span class="sc'+cls+'">'+r.as+'</span></div>';
  }else if(s==='fin'){
    figure='<div class="scores"><span class="sc dim">–</span><span class="sc dim">–</span></div>';
  }else if(s==='live'){
    figure='<div class="scores"><span class="sc dim">·</span><span class="sc dim">·</span></div>';
  }else{
    figure='<div class="kick"><span class="eyebrow">开球</span><span class="t">'+
           fmtTime.format(new Date(koMs(m)))+'</span></div>';
  }

  const whenHtml = (s==='up') ? '' :
    '<span class="when"><span class="wlabel">比赛时间：</span>'+
    fmtMD.format(new Date(koMs(m)))+' '+fmtTime.format(new Date(koMs(m)))+'</span>';
  el.innerHTML=
    '<div class="chd"><div class="tags">'+pill+'</div>'+state+'</div>'+
    '<div class="grid"><div class="sides">'+
      side(m.hf,m.hz,hB,tbd)+side(m.af,m.az,aB,tbd)+
    '</div><div class="figure">'+figure+'</div></div>'+
    '<div class="foot"><span class="loc">📍 '+m.c+' · '+m.v+'</span>'+whenHtml+'</div>';
  if(s==='live'){
    el.classList.add('clickable');
    const wt = isKnock(m) ? (m.st+'｜'+m.hz+' vs '+m.az) : (m.hf+' '+m.hz+' vs '+m.af+' '+m.az);
    el.addEventListener('click',()=>openWatch(wt));
  }
  return el;
}

function utcYMD(ms){const d=new Date(ms);
  return ''+d.getUTCFullYear()+String(d.getUTCMonth()+1).padStart(2,'0')+String(d.getUTCDate()).padStart(2,'0');}
function setUpd(state,txt){
  document.getElementById('updDot').className='dot '+state;
  document.getElementById('updTxt').textContent=txt;
}

// ---- source 1: ESPN public API (works in any normal browser / when hosted) ----
async function fromESPN(){
  const now=Date.now(); const dset=new Set();
  DATA.forEach(m=>{ if(!teamsKnown(m))return; if(koMs(m)>now)return;
    dset.add(utcYMD(koMs(m))); dset.add(utcYMD(koMs(m)-86400000)); });
  dset.add(utcYMD(now)); dset.add(utcYMD(now+86400000)); dset.add(utcYMD(now-86400000));
  const base="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=";
  let parts;
  try{ parts=await Promise.all([...dset].map(d=>fetch(base+d).then(r=>r.ok?r.json():null).catch(()=>null))); }
  catch(e){ return null; }
  const next={}; let any=false;
  parts.forEach(j=>{ if(!j||!Array.isArray(j.events))return; any=true;
    j.events.forEach(ev=>{
      const comp=ev.competitions&&ev.competitions[0]; if(!comp)return;
      const cs=comp.competitors||[]; if(cs.length<2)return;
      const H=cs.find(c=>c.homeAway==='home')||cs[0];
      const A=cs.find(c=>c.homeAway==='away')||cs[1];
      const st=((comp.status&&comp.status.type&&comp.status.type.state)||'').toLowerCase();
      if(st!=='in'&&st!=='post')return;
      const nH=(H.team&&(H.team.displayName||H.team.name||H.team.shortDisplayName))||'';
      const nA=(A.team&&(A.team.displayName||A.team.name||A.team.shortDisplayName))||'';
      const fx=byPair[pairKey(nH,nA)]; if(!fx)return;
      const hs=parseInt(H.score,10), as=parseInt(A.score,10);
      if(isNaN(hs)||isNaN(as))return;
      const orient=canon(fx.h)===canon(nH);
      let w=H.winner===true?'h':A.winner===true?'a':null;   // ESPN 胜者标志(淘汰赛点球也准)
      if(!orient)w=(w==='h'?'a':w==='a'?'h':null);
      next[fx.n]={hs:orient?hs:as, as:orient?as:hs, live:st==='in', w:w};
    });
  });
  return any? next : null;
}

// ---- source 2: Claude + web search (fallback; works inside Claude preview) ----
async function fromClaude(){
  const names=[...new Set(DATA.filter(m=>!isKnock(m)).flatMap(m=>[m.h,m.a]))];
  const prompt="Use web search to find the LATEST 2026 FIFA World Cup match results. "+
   "Return ONLY minified JSON, no markdown, no fences, no commentary. "+
   "Schema: {\"m\":[[\"home\",\"away\",homeScore,awayScore,live]]}. "+
   "home/away are names taken EXACTLY from this list -> "+JSON.stringify(names)+
   " ; scores are integers; live=1 if in progress else 0. Include EVERY match already kicked off. "+
   "If a team is not in the list, skip it. If none started, return {\"m\":[]}.";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        messages:[{role:"user",content:prompt}],
        tools:[{type:"web_search_20250305",name:"web_search"}]})});
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const a=text.indexOf("{"), b=text.lastIndexOf("}"); if(a<0||b<0) return null;
    const obj=JSON.parse(text.slice(a,b+1)); const next={};
    (obj.m||[]).forEach(row=>{ if(!Array.isArray(row)||row.length<4)return;
      const h=row[0],a2=row[1],hs=+row[2],as2=+row[3],live=row[4]==1;
      const fx=byPair[pairKey(h,a2)]; if(!fx)return;
      const orient=canon(fx.h)===canon(h);
      next[fx.n]={hs:orient?hs:as2, as:orient?as2:hs, live:live}; });
    return next;
  }catch(e){ return null; }
}

// ---- source 3: 同源缓存(CI 每 30 分钟把 ESPN 比分快照到 ./live/scores.json) ----
// 浏览器直连 ESPN 失败时(如中国大陆网络)回退读它,比分不再空白;已结束比赛结果始终正确。
let cacheUpdated=null;
async function fromCache(){
  try{
    const r=await fetch('./live/scores.json',{cache:'no-store'}); if(!r.ok) return null;
    const j=await r.json(); const sc=j&&j.scores; if(!sc) return null;
    const next={}; let any=false;
    Object.keys(sc).forEach(n=>{ const v=sc[n]; if(!v)return;
      next[n]={hs:v.hs, as:v.as, live:!!v.live, w:v.w||null}; any=true; });
    cacheUpdated=j.updated||null;
    return any? next : null;
  }catch(e){ return null; }
}

async function fetchScores(){
  setUpd('load','正在获取最新比分…');
  let next=await fromESPN(), src='espn';                                   // 1) 直连 ESPN(最实时)
  if(!next || Object.keys(next).length===0){ const c=await fromCache(); if(c){ next=c; src='cache'; } }   // 2) 同源缓存兜底
  if(!next || Object.keys(next).length===0){ const alt=await fromClaude(); if(alt){ next=alt; src='claude'; } } // 3) Claude(仅预览环境)
  if(next && Object.keys(next).length){
    RESULTS=next;
    const n=Object.keys(next).length;
    if(src==='cache'){
      let t=cacheUpdated;
      try{ t=new Date(cacheUpdated).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}); }catch(e){}
      setUpd('ok','比分(缓存)· 更新于 '+(t||'—')+' · 共 '+n+' 场');
    }else{
      const t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',hour12:false});
      setUpd('ok','比分更新于 '+t+' · 已收录 '+n+' 场');
    }
    render();
    renderStandings();
    if(++scoreRenders===1){ landedDone=false; landBoundary(); }  // 比分首次到位后重新定位(初次定位会被本次重渲染打断)
  }else{
    setUpd('err','比分暂时取不到，稍后再点“刷新比分”');
    landBoundary();
  }
}

function escH(s){return (''+s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function renderStandings(){
  const box=document.getElementById('standings');
  const S=computeStandings(DATA,RESULTS);
  let played=0,total=0;
  DATA.forEach(m=>{ if(m.g&&!isKnock(m)){ total++; if(RESULTS[m.n]&&!RESULTS[m.n].live) played++; } });
  let h='<div class="stnote">🔮 <b>晋级预测</b> · 按当前比分实时推算('+played+'/'+total+' 场小组赛已完);'+
    '小组赛 6/27 才全部结束,排名会随比分变化,<b>仅供参考</b>。<br>'+
    '<span style="color:var(--turf);font-weight:800">绿</span> 预计小组前 2 直接晋级 · '+
    '<span style="color:var(--amber);font-weight:800">黄</span> 预计最佳第 3 名晋级(12 组取最好的 8 个)。</div>';
  Object.keys(S.groups).sort().forEach(g=>{
    const rows=S.groups[g];
    const q3=S.thirds.find(x=>x.g===g&&x.qualified);
    h+='<div class="grp"><h3><span class="gb">'+g+'</span>组</h3>'+
       '<table class="stt"><thead><tr><th class="rk">#</th><th class="tm">球队</th>'+
       '<th>场</th><th>胜</th><th>平</th><th>负</th><th>净</th><th>积</th></tr></thead><tbody>';
    rows.forEach((t,i)=>{
      const cls=i===0?'q1':i===1?'q2':((i===2&&q3)?'q3':'');
      const gd=(t.GD>0?'+':'')+t.GD;
      h+='<tr class="'+cls+'"><td class="rk">'+(i+1)+'</td>'+
         '<td class="tm"><span class="fl">'+(t.flag||'🏳️')+'</span>'+escH(t.name)+'</td>'+
         '<td>'+t.P+'</td><td>'+t.W+'</td><td>'+t.D+'</td><td>'+t.L+'</td>'+
         '<td>'+gd+'</td><td class="pt">'+t.Pts+'</td></tr>';
    });
    h+='</tbody></table></div>';
  });
  h+='<div class="grp"><h3><span class="gb" style="background:var(--amber)">3</span>最佳第三名 · 取前 8 晋级</h3>'+
     '<table class="stt"><thead><tr><th class="rk">#</th><th class="tm">球队</th><th>组</th>'+
     '<th>场</th><th>净</th><th>积</th><th>结果</th></tr></thead><tbody>';
  S.thirds.forEach((x,i)=>{
    const t=x.t,gd=(t.GD>0?'+':'')+t.GD;
    h+='<tr class="'+(x.qualified?'q3':'')+'"><td class="rk">'+(i+1)+'</td>'+
       '<td class="tm"><span class="fl">'+(t.flag||'🏳️')+'</span>'+escH(t.name)+'</td>'+
       '<td>'+x.g+'</td><td>'+t.P+'</td><td>'+gd+'</td><td class="pt">'+t.Pts+'</td>'+
       '<td><span class="qbadge '+(x.qualified?'in':'out')+'">'+(x.qualified?'晋级':'淘汰')+'</span></td></tr>';
  });
  h+='</tbody></table></div>';
  const chip=(x,k)=>'<span class="qchip"><span class="fl">'+(x.t.flag||'🏳️')+'</span>'+escH(x.t.name)+
    '<span class="g">'+x.g+k+'</span></span>';
  const tQ=S.thirds.filter(x=>x.qualified);
  h+='<div class="q32"><h3>🏆 晋级 32 强(预测 · 共 '+(S.winners.length+S.runners.length+tQ.length)+' 队)</h3>'+
     '<div class="qcol"><div class="lbl">各组第 1（'+S.winners.length+'）</div><div class="qchips">'+
       S.winners.map(x=>chip(x,'·1')).join('')+'</div></div>'+
     '<div class="qcol"><div class="lbl">各组第 2（'+S.runners.length+'）</div><div class="qchips">'+
       S.runners.map(x=>chip(x,'·2')).join('')+'</div></div>'+
     '<div class="qcol"><div class="lbl">最佳第 3（'+tQ.length+'）</div><div class="qchips">'+
       tQ.map(x=>chip(x,'·3')).join('')+'</div></div></div>';
  h+=renderKnockout();
  box.innerHTML=h;
}

// 淘汰赛某场胜者:'h'/'a'/null。优先用 ESPN 胜者标志(点球也准),否则比分;平局无标志 → 未定
function koWinner(m){
  const r=RESULTS[m.n]; if(!r||r.live) return null;
  if(r.w==='h'||r.w==='a') return r.w;
  if(r.hs>r.as) return 'h'; if(r.as>r.hs) return 'a'; return null;
}
// 淘汰赛对阵图 / 晋级:逐轮渲染,胜者标✓晋级;末尾给冠军。随 update_knockout 回填与比分自动更新
function renderKnockout(){
  const rounds=[
    {sk:'round-of-32',  label:'32 强赛'},
    {sk:'round-of-16',  label:'16 强赛'},
    {sk:'quarter-finals',label:'8 强(1/4 决赛)'},
    {sk:'semi-finals',  label:'半决赛'},
    {sk:'third-place',  label:'三四名决赛'},
    {sk:'final',        label:'决赛'}
  ];
  let h='<div class="q32"><h3>🏆 淘汰赛对阵 · 晋级</h3>';
  rounds.forEach(rd=>{
    const ms=DATA.filter(m=>m.sk===rd.sk).sort((a,b)=>a.n-b.n);
    if(!ms.length) return;
    h+='<div class="brkrd"><div class="brkh">'+rd.label+'<span class="brkc">'+ms.length+' 场</span></div>';
    if(!ms.some(teamsKnown)){                       // 该轮队伍还没定 → 折叠一行
      h+='<div class="brkwait">待上一轮结束后自动揭晓</div></div>'; return;
    }
    ms.forEach(m=>{
      const w=koWinner(m), r=RESULTS[m.n], known=teamsKnown(m);
      const side=(s)=>{
        const fl=(s==='h'?m.hf:m.af)||'', name=s==='h'?m.hz:m.az, win=w===s;
        return '<span class="brkt'+(s==='a'?' aw':'')+(win?' win':'')+(known?'':' tbd')+'">'+
               (s==='a'?escH(name)+(win?' <span class="brkok">✓</span>':'')+'<span class="fl">'+fl+'</span>'
                       :'<span class="fl">'+fl+'</span>'+escH(name)+(win?' <span class="brkok">✓</span>':''))+'</span>';
      };
      const mid=r?('<span class="brks">'+r.hs+'</span><span class="brkd">:</span><span class="brks">'+r.as+'</span>')
                 :'<span class="brkvs">vs</span>';
      h+='<div class="brkm">'+side('h')+'<span class="brkmid">'+mid+'</span>'+side('a')+'</div>';
    });
    h+='</div>';
  });
  const fin=DATA.find(m=>m.sk==='final'), fw=fin?koWinner(fin):null;
  if(fw){ const fl=(fw==='h'?fin.hf:fin.af)||'', nm=fw==='h'?fin.hz:fin.az;
    h+='<div class="champ">🏆 冠军:<span class="fl">'+fl+'</span>'+escH(nm)+'</div>'; }
  return h+'</div>';
}

function landBoundary(){
  if(landedDone||!lastNext) return;
  if(document.getElementById('list').hidden) return;            // 仅在赛程视图定位
  landedDone=true;
  requestAnimationFrame(()=>{
    const y=lastNext.getBoundingClientRect().top+window.pageYOffset-window.innerHeight*0.38;
    window.scrollTo({top:Math.max(0,y),behavior:'smooth'});     // 下一场置于视口约 38% 处:上方刚结束、下方未开始
  });
}
