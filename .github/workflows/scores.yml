name: Snapshot live scores

# 比分兜底:云端(可正常访问 ESPN)定时抓比分,写入 live/scores.json。
# 前端在浏览器直连 ESPN 失败时(如中国大陆网络)回退读这个同源文件 —— 比分不再空白。
#  - 每 30 分钟一次(UTC),也可手动触发
#  - 用 [skip ci] 提交,不触发 build.yml(live/ 不参与站点构建);Pages 仍会随推送刷新
#  - live/ 不在 build.yml 的监听路径里,所以不会引发整站重建

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# 同一时间只跑一个,避免叠加
concurrency:
  group: scores
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch ESPN scores → live/scores.json
        run: python scripts/fetch_scores.py    # 仅标准库

      - name: Commit snapshot if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live/scores.json
          if git diff --staged --quiet; then
            echo "比分无变化 — 跳过提交。"
          else
            git commit -m "chore: 比分快照更新 [skip ci]"
            git push
          fi
